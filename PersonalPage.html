<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2f3c7e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .card img {
            width: 300px;
            border-radius: 15px;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .info p {
            font-size: 18px;
            line-height: 1.6;
            color: #e5e5e5;
        }

        .label {
            color: #8fb8ff;
            font-weight: bold;
        }

        .contact {
            margin-top: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }

        @media (max-width: 700px) {
            .card {
                flex-direction: column;
                text-align: center;
            }

            .card img {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="ImgPerson.png" alt="Person">

        <div class="info">
            <h1>Deryll Clyde</h1>

            <p><span class="label">Gender:</span> Male</p>

            <p><span class="label">Favourite Book:</span> 1984</p>

            <p><span class="label">Hobby:</span> Writing</p>

            <div class="contact">
                <p><span class="label">Phone:</span> 550 12 21 12</p>
                <p><span class="label">Email:</span> DeryllClyde@Clyde.net</p>
            </div>
        </div>

    </div>

</body>

</html>
